{% extends "admin_blank.html" %}

{% block content %}
    <style>
        h1 {
            color: #eb1616;
            text-align: center;
            margin-bottom: 20px;
        }
        .form-container {
            background-color: #fff;
            border-radius: 5px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            max-width: 1000px;
            margin: auto;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        input[type="text"], input[type="file"], select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus, input[type="file"]:focus, select:focus {
            border-color: #Eb1616;
            outline: none;
        }
        button {
            background-color: #eb1616;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #eb1616;
        }
        .cancel-btn {
            display: block;
            background-color: #eb1616;
            text-align: center;
            margin-top: 10px;
            padding: 10px;
            text-decoration: none;
            border-radius: 5px;
            color: white;
            transition: background-color 0.3s;
        }
        .cancel-btn:hover {
            background-color: #eb1616;
        }
    </style>

    <div class="form-container">
        <h1>{{ title }}</h1>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <label for="lesson">Lesson:</label>
            <select name="lesson" id="lesson" required>
                {% for lesson in lessons %}
                    <option value="{{ lesson.id }}">{{ lesson.subject.name }} - Lesson {{ lesson.lesson_number }}</option>
                {% endfor %}
            </select>

            <label for="description">Description:</label>
            {{ form.description }}
            {% if form.description.errors %}
                <div class="error">{{ form.description.errors }}</div>
            {% endif %}

            <label for="file">File:</label>
            {{ form.file }}
            {% if form.file.errors %}
                <div class="error">{{ form.file.errors }}</div>
            {% endif %}

            <button type="submit">Submit</button>
            <a href="{% url 'documentation_list' %}" class="cancel-btn">Cancel</a>
        </form>
    </div>

{% endblock %}
